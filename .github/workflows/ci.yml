name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Run – single philosopher (must die)
        run: timeout 5 ./philo 1 800 200 200 || true

      - name: Run – five philosophers eat twice then stop
        run: timeout 15 ./philo 5 800 200 200 2

      - name: Run – four philosophers eat seven times then stop
        run: timeout 30 ./philo 4 410 200 200 7

      - name: Run – invalid input returns error
        run: |
          ! ./philo
          ! ./philo 0 800 200 200
          ! ./philo -1 800 200 200
          ! ./philo abc 800 200 200
